name: Execução de Testes de API

on:
  push:
    branches: ["main", "feature/*"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-automation

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Executar Testes de API (RestAssured)
        run: mvn clean test

      - name: Gerar Relatório HTML (Allure)
        if: always()
        run: mvn allure:report

      - name: Salvar Artefato do Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report-api
          path: api-automation/target/site/allure-maven-plugin/
          retention-days: 5