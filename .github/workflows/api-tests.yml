name: Execução de Testes de API

on:
  push:
    branches: ["main", "feature/*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: '**/pom.xml'

      - name: Executar testes com Maven
        run: mvn clean test allure:report

      - name: Salvar relatório Allure como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-allure-${{ github.run_number }}-${{ github.run_attempt }}
          path: target/site/allure-maven-plugin/
          if-no-files-found: warn

      - name: Publicar relatório para GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site/allure-maven-plugin/

  deploy-pages:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Deploy para GitHub Pages
        uses: actions/deploy-pages@v4