name: Execução de Testes de API

on:
  push:
    branches: [ "main", "feature/desafio-api" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Rodar os testes de API com Maven
      working-directory: api-automation
      run: mvn clean test

    - name: Upload do Relatório Allure como Artefato
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: api-automation/target/site/allure-maven-plugin/